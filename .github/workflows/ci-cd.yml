name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - frontend
      - backend
      - telegram_bot
  workflow_dispatch: # возможность запускать вручную

env:
  DOMAIN: ${{ secrets.DOMAIN }}
  GIT_USER: ${{ secrets.GIT_USER }}
  GIT_TOKEN: ${{ secrets.CI_GITLAB_TOKEN }}
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Clone repos
        run: |
          git clone --branch main https://${{ env.GIT_USER }}:${{ env.GIT_TOKEN }}@gitlab.com/entergen/media/representation/frontend.git /tmp/frontend
          git clone --branch main https://${{ env.GIT_USER }}:${{ env.GIT_TOKEN }}@gitlab.com/entergen/media/representation/gateway.git /tmp/gateway
          git clone --branch main https://${{ env.GIT_USER }}:${{ env.GIT_TOKEN }}@gitlab.com/entergen/media/representation/backend.git /tmp/backend
          git clone --branch main https://${{ env.GIT_USER }}:${{ env.GIT_TOKEN }}@gitlab.com/entergen/media/representation/telegram_bot.git /tmp/telegram_bot
          ls -R /tmp

      - name: Build and push frontend
        run: docker build --platform linux/amd64 -t kaka22897/entergen_frontend:latest -f /tmp/frontend/Dockerfile /tmp/frontend && docker push kaka22897/entergen_frontend:latest

      - name: Build and push gateway
        run: docker build --platform linux/amd64 -t kaka22897/entergen_gateway:latest -f /tmp/gateway/Dockerfile /tmp/gateway && docker push kaka22897/entergen_gateway:latest

      - name: Build and push backend
        run: docker build --platform linux/amd64 -t kaka22897/entergen_backend:latest -f /tmp/backend/Dockerfile /tmp/backend && docker push kaka22897/entergen_backend:latest

      - name: Build and push telegram_bot
        run: docker build --platform linux/amd64 -t kaka22897/entergen_telegram_bot:latest -f /tmp/telegram_bot/Dockerfile /tmp/telegram_bot && docker push kaka22897/entergen_telegram_bot:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan 139.28.222.68 >> ~/.ssh/known_hosts

      - name: Copy .env file
        run: scp "${{ secrets.ENV_FILE }}" root@139.28.222.68:/root/general/.env

      - name: Deploy on server
        run: |
          ssh root@139.28.222.68 << 'EOF'
          docker network create --driver bridge --attachable shared-network || true
          cd /root/general
          git pull
          docker compose pull
          docker compose down --remove-orphans
          docker compose up --build --detach

          if [ -f /root/blog/docker-compose.yml ]; then
            cd /root/blog
            docker compose down --remove-orphans
            docker compose up --build --detach
          fi

          docker image prune -f || true
          rm -f .env
          EOF
